<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1180" viewBox="0 0 1240 1180"
     font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"
            markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"
            markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#d98324"/>
    </marker>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f9d63"/>
      <stop offset="70%" stop-color="#1f9d63"/>
      <stop offset="100%" stop-color="#d98324"/>
    </linearGradient>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1240" height="1180" fill="white"/>
  <text x="560" y="42" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Provider &amp; Practice Directory Update Pipeline — Agent Workflow</text>
  <rect x="200" y="70" width="720" height="52" rx="10" fill="#e7f0fb" stroke="#2563a8" stroke-width="2" filter="url(#sh)"/><text x="560.0" y="87.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">HealthLynked Provider / Practice Directory</text><text x="560.0" y="110.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">system of record</text><line x1="560" y1="122" x2="560" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><text x="569.0" y="136.0" font-size="11.5" fill="#475569" dominant-baseline="middle">snapshot</text><rect x="200" y="150" width="720" height="64" rx="12" fill="#e8f7ef" stroke="#1f9d63" stroke-width="2" filter="url(#sh)"/><text x="560.0" y="173.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">Triage / Risk Agent</text><text x="560.0" y="196.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">staleness vs 90-day cadence · field volatility · hard signals  →  verify queue</text><circle cx="224" cy="172" r="13" fill="#1f9d63"/><text x="224" y="172" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="white">1</text><line x1="560" y1="214" x2="560" y2="242" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><text x="569.0" y="228.0" font-size="11.5" fill="#475569" dominant-baseline="middle">prioritized records</text><rect x="200" y="242" width="720" height="92" rx="12" fill="#e8f7ef" stroke="#1f9d63" stroke-width="2" filter="url(#sh)"/><text x="560.0" y="288.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle"></text><circle cx="224" cy="264" r="13" fill="#1f9d63"/><text x="224" y="264" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="white">2</text><text x="560" y="270" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Source Harvest</text><text x="560" y="296" text-anchor="middle" font-size="12.5" fill="#1f9d63" font-weight="700">Tier 0/1 (free, always): NPPES · CMS Doctors &amp; Clinicians · PECOS</text><text x="560" y="316" text-anchor="middle" font-size="12.5" fill="#d98324" font-weight="700">Tier 3 (gated, residual only): practice website · state board</text><rect x="944" y="256" width="158" height="74" rx="12" fill="#fcf1e2" stroke="#d98324" stroke-width="2" filter="url(#sh)"/><circle cx="1023.0" cy="256" r="13" fill="#d98324"/><text x="1023.0" y="256" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="white">6</text><text x="1023.0" y="288" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">LLM Extraction</text><text x="1023.0" y="308" text-anchor="middle" font-size="12.5" fill="#475569">extracts text; never invents</text><line x1="944" y1="293" x2="920" y2="293" stroke="#d98324" stroke-width="2" marker-start="url(#arrowA)" marker-end="url(#arrowA)"/><line x1="560" y1="334" x2="560" y2="362" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><text x="569.0" y="348.0" font-size="11.5" fill="#475569" dominant-baseline="middle">candidate values + provenance</text><rect x="200" y="362" width="720" height="64" rx="12" fill="#e8f7ef" stroke="#1f9d63" stroke-width="2" filter="url(#sh)"/><text x="560.0" y="385.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">Normalization Engine</text><text x="560.0" y="408.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">address + Census geocode · phone E.164 · NUCC taxonomy · structured name</text><circle cx="224" cy="384" r="13" fill="#1f9d63"/><text x="224" y="384" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="white">3</text><line x1="560" y1="426" x2="560" y2="454" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><text x="569.0" y="440.0" font-size="11.5" fill="#475569" dominant-baseline="middle">normalized values</text><rect x="200" y="454" width="720" height="64" rx="12" fill="#e8f7ef" stroke="#1f9d63" stroke-width="2" filter="url(#sh)"/><text x="560.0" y="477.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">Matching / Entity Resolution</text><text x="560.0" y="500.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">dedup · provider movement · practice relocation · geocoded location match</text><circle cx="224" cy="476" r="13" fill="#1f9d63"/><text x="224" y="476" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="white">4</text><line x1="560" y1="518" x2="560" y2="546" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><text x="569.0" y="532.0" font-size="11.5" fill="#475569" dominant-baseline="middle">linked entities + value sets</text><rect x="200" y="546" width="720" height="66" rx="12" fill="#e8f7ef" stroke="#1f9d63" stroke-width="2" filter="url(#sh)"/><text x="560.0" y="570.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">Confidence &amp; Decision Engine</text><text x="560.0" y="593.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">source-weighted score · independence-class corroboration · safe-update rules</text><circle cx="224" cy="568" r="13" fill="#1f9d63"/><text x="224" y="568" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="white">5</text><line x1="560" y1="612" x2="560" y2="642" stroke="#475569" stroke-width="2"/><line x1="182.0" y1="642" x2="938.0" y2="642" stroke="#475569" stroke-width="2"/><line x1="182.0" y1="642" x2="182.0" y2="672" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><line x1="434.0" y1="642" x2="434.0" y2="672" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><line x1="686.0" y1="642" x2="686.0" y2="672" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><line x1="938.0" y1="642" x2="938.0" y2="672" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><rect x="64.0" y="672" width="236" height="60" rx="10" fill="#e7f0fb" stroke="#2563a8" stroke-width="2" filter="url(#sh)"/><text x="182.0" y="693.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">NO CHANGE</text><text x="182.0" y="716.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">confirmed</text><rect x="316.0" y="672" width="236" height="60" rx="10" fill="#e8f7ef" stroke="#1f9d63" stroke-width="2" filter="url(#sh)"/><text x="434.0" y="693.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">AUTO-UPDATE</text><text x="434.0" y="716.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">high conf + safe</text><rect x="568.0" y="672" width="236" height="60" rx="10" fill="#fcf1e2" stroke="#d98324" stroke-width="2" filter="url(#sh)"/><text x="686.0" y="693.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">HUMAN REVIEW</text><text x="686.0" y="716.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">conflict / mid conf</text><rect x="820.0" y="672" width="236" height="60" rx="10" fill="#eef1f5" stroke="#475569" stroke-width="2" filter="url(#sh)"/><text x="938.0" y="693.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">DISCARD / HOLD</text><text x="938.0" y="716.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">too weak</text><line x1="182.0" y1="732" x2="182.0" y2="758" stroke="#475569" stroke-width="2"/><line x1="434.0" y1="732" x2="434.0" y2="758" stroke="#475569" stroke-width="2"/><line x1="686.0" y1="732" x2="686.0" y2="758" stroke="#475569" stroke-width="2"/><line x1="938.0" y1="732" x2="938.0" y2="758" stroke="#475569" stroke-width="2"/><line x1="182.0" y1="758" x2="938.0" y2="758" stroke="#475569" stroke-width="2"/><line x1="560" y1="758" x2="560" y2="786" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><rect x="200" y="786" width="720" height="64" rx="12" fill="#e7f0fb" stroke="#2563a8" stroke-width="2" filter="url(#sh)"/><text x="560.0" y="809.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">Audit / Provenance Store   (append-only, content-hashed)</text><text x="560.0" y="832.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">old → new · sources + snapshots · score math · decision · actor · timestamp</text><circle cx="224" cy="808" r="13" fill="#2563a8"/><text x="224" y="808" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="white">7</text><path d="M 200 818 H 96 V 96 H 200" fill="none" stroke="#2563a8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/><text x="86" y="460" font-size="12" fill="#2563a8" font-weight="700" transform="rotate(-90 86 460)" text-anchor="middle">write back approved updates</text><line x1="560" y1="850" x2="560" y2="878" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><rect x="200" y="878" width="720" height="64" rx="12" fill="#e7f0fb" stroke="#2563a8" stroke-width="2" filter="url(#sh)"/><text x="560.0" y="901.0" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a" dominant-baseline="middle">Human-Review Dashboard</text><text x="560.0" y="924.0" text-anchor="middle" font-size="12.5" fill="#475569" dominant-baseline="middle">reviews the residual; every approve / reject is logged as a training label</text><circle cx="224" cy="900" r="13" fill="#2563a8"/><text x="224" y="900" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="white">8</text><path d="M 920 910 H 1186 V 579 H 920" fill="none" stroke="#d98324" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/><text x="1198" y="745" font-size="12" fill="#d98324" font-weight="700" transform="rotate(-90 1198 745)" text-anchor="middle">labels tune thresholds</text><rect x="44" y="156" width="10" height="450" rx="5" fill="url(#grad)"/><text x="70" y="381.0" font-size="12.5" fill="#475569" font-weight="700" transform="rotate(-90 70 381.0)" text-anchor="middle">cost / authority gradient — route each record only as far as it needs to go</text><text x="200" y="1000" font-size="13" font-weight="700" fill="#0f172a">Legend</text><rect x="200" y="1008" width="22" height="16" rx="4" fill="#e8f7ef" stroke="#1f9d63" stroke-width="2"/><text x="232" y="1020" font-size="13" fill="#475569">free / deterministic  (≈ $0 per record — Tiers 0–2)</text><rect x="200" y="1034" width="22" height="16" rx="4" fill="#fcf1e2" stroke="#d98324" stroke-width="2"/><text x="232" y="1046" font-size="13" fill="#475569">gated LLM / scrape — the only paid tier, residual only (Tier 3)</text><rect x="200" y="1060" width="22" height="16" rx="4" fill="#e7f0fb" stroke="#2563a8" stroke-width="2"/><text x="232" y="1072" font-size="13" fill="#475569">storage / UI / system of record</text><text x="920" y="1000" text-anchor="end" font-size="12" fill="#475569">Agentic: 1 (triage) · 2 (gated harvest) · 6 (LLM extraction).  3 / 4 / 5 / 7 / 8 are deterministic, testable code.</text>
</svg>
