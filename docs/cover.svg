<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"
     font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f9d63"/>
      <stop offset="60%" stop-color="#1f9d63"/>
      <stop offset="80%" stop-color="#d98324"/>
      <stop offset="100%" stop-color="#2563a8"/>
    </linearGradient>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f9fc"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="white"/><rect width="1600" height="8" fill="url(#bar)"/><rect x="0" y="8" width="1600" height="892" fill="url(#wash)"/><text x="96" y="196" font-size="17" font-weight="700" fill="#1f9d63" text-anchor="start" letter-spacing="1.5">HEALTHLYNKED  ·  PROVIDER &amp; PRACTICE DIRECTORY CHALLENGE</text><text x="96" y="270" font-size="58" font-weight="800" fill="#0f172a" text-anchor="start">Provider &amp; Practice</text><text x="96" y="338" font-size="58" font-weight="800" fill="#0f172a" text-anchor="start">Directory Update Pipeline</text><text x="96" y="396" font-size="23" font-weight="400" fill="#475569" text-anchor="start">A repeatable, cost-efficient pipeline that keeps a healthcare</text><text x="96" y="428" font-size="23" font-weight="400" fill="#475569" text-anchor="start">directory accurate — and measures its own accuracy.</text><text x="96" y="486" font-size="20" font-weight="700" fill="#178a55" text-anchor="start">Deterministic-first, LLM-last.</text><text x="96" y="516" font-size="20" font-weight="400" fill="#475569" text-anchor="start">Most updates already sit in free U.S. government data, so the bulk</text><text x="96" y="544" font-size="20" font-weight="400" fill="#475569" text-anchor="start">resolves at ~$0 — only the residual reaches an LLM, scrape, or human.</text><rect x="96" y="588" width="286" height="36" rx="18" fill="#e8f7ef" stroke="#1f9d63" stroke-width="1.5"/><circle cx="115" cy="606" r="4.5" fill="#1f9d63"/><text x="129" y="611" font-size="15.5" font-weight="600" fill="#0f172a">≈ $0 per record on the hot path</text><rect x="396.0" y="588" width="318" height="36" rx="18" fill="#fcf1e2" stroke="#d98324" stroke-width="1.5"/><circle cx="415.0" cy="606" r="4.5" fill="#d98324"/><text x="429.0" y="611" font-size="15.5" font-weight="600" fill="#0f172a">0 paid APIs — free NPPES + CMS data</text><rect x="96" y="636" width="334" height="36" rx="18" fill="#e7f0fb" stroke="#2563a8" stroke-width="1.5"/><circle cx="115" cy="654" r="4.5" fill="#2563a8"/><text x="129" y="659" font-size="15.5" font-weight="600" fill="#0f172a">≈ 97% auto-update precision, measured</text><rect x="444.0" y="636" width="366" height="36" rx="18" fill="#eef1f5" stroke="#475569" stroke-width="1.5"/><circle cx="463.0" cy="654" r="4.5" fill="#475569"/><text x="477.0" y="659" font-size="15.5" font-weight="600" fill="#0f172a">transparent confidence + full audit trail</text><text x="96" y="792" font-size="18" font-weight="500" fill="#64748b" text-anchor="start">Hybrid submission — runnable prototype + production architecture.</text><path d="M 975.0 232 H 1495.0 L 1333.0 602 H 1137.0 Z" fill="#eef2f7"/><text x="1235" y="216" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">every directory record</text><rect x="1010" y="250" width="450" height="60" rx="9" fill="#1f9d63"/><text x="1235" y="286.0" font-size="18.5" font-weight="700" fill="white" text-anchor="middle">Structured reconcile · NPPES + CMS</text><rect x="1047" y="335" width="376" height="60" rx="9" fill="#178a55"/><text x="1235" y="371.0" font-size="18.5" font-weight="700" fill="white" text-anchor="middle">Confidence + safe-update rules</text><rect x="1084" y="420" width="301" height="60" rx="9" fill="#d98324"/><text x="1235" y="456.0" font-size="18.5" font-weight="700" fill="white" text-anchor="middle">Gated web / LLM extraction</text><rect x="1122" y="505" width="227" height="60" rx="9" fill="#2563a8"/><text x="1235" y="541.0" font-size="18.5" font-weight="700" fill="white" text-anchor="middle">Human review</text><text x="953.0" y="280" font-size="15.5" font-weight="600" fill="#64748b" text-anchor="end">100% — free</text><text x="953.0" y="450" font-size="15.5" font-weight="600" fill="#64748b" text-anchor="end">~10% residual</text><text x="953.0" y="535" font-size="15.5" font-weight="600" fill="#64748b" text-anchor="end">≈3–5%</text><text x="1235" y="636" font-size="16" font-weight="500" fill="#475569" text-anchor="middle">route each record only as far down the cost gradient as it needs to go</text>
</svg>
